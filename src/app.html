<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Julian Roberts | jroberts.info</title>
		<meta name="description" content="Julian Roberts - Senior Software Engineer. Full stack engineer building scalable systems." />
		<script>
			(function() {
				const saved = localStorage.getItem('theme');
				if (saved) document.documentElement.setAttribute('data-theme', saved);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-base-100 text-base-content min-h-screen">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
